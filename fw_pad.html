<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>野外調査レコーダー</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet CSS & JS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        #map { height: 250px; border-radius: 0.75rem; z-index: 10; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

    <!-- ヘッダー -->
    <header class="bg-emerald-700 text-white shadow-md sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i data-lucide="compass" class="w-6 h-6"></i>
            <h1 class="text-lg font-bold tracking-wider">野外調査レコーダー</h1>
        </div>
        <div class="flex items-center space-x-2">
            <span id="gps-status-badge" class="text-xs bg-emerald-800 text-emerald-200 px-2 py-1 rounded-full flex items-center gap-1">
                <span class="w-2 h-2 rounded-full bg-slate-400 inline-block" id="gps-indicator"></span>
                <span id="gps-status-text">GPS待機中</span>
            </span>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-1 max-w-4xl w-full mx-auto p-4 space-y-4 pb-24">

        <!-- セキュリティ警告バナー -->
        <div id="security-warning" class="hidden bg-amber-50 border border-amber-200 rounded-xl p-4 flex gap-3 text-amber-900 text-xs">
            <i data-lucide="alert-triangle" class="w-5 h-5 text-amber-600 shrink-0"></i>
            <div class="space-y-1">
                <p class="font-bold">【重要】GPSが動作しない可能性があります</p>
                <p>現在HTTPS接続（またはlocalhost）ではないため、ブラウザの制限により2点目以降の位置情報が更新されないか、ブロックされる可能性があります。</p>
            </div>
        </div>

        <!-- 新規レコード入力カード -->
        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4">
            <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                <h2 class="font-bold text-slate-700 flex items-center gap-2">
                    <i data-lucide="pen-tool" class="text-emerald-600 w-5 h-5"></i>
                    新規調査メモの入力
                </h2>
                <span class="text-xs text-slate-400" id="live-clock">00:00:00</span>
            </div>

            <!-- 入力フォーム (カテゴリを削除し、地点名入力をフルサイズに最適化) -->
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">調査地点名 / タグ</label>
                <input type="text" id="note-title" placeholder="例: 地点A, コドラート1, 湧水サンプリング地点" 
                       class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
            </div>

            <!-- メモ本文（入力を始めると自動でGPS起動） -->
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1 flex justify-between">
                    <span>調査メモ・測定データ</span>
                    <span class="text-emerald-600 text-[10px] font-normal animate-pulse hidden" id="auto-gps-msg">
                        新しい位置情報をリアルタイム測定中...
                    </span>
                </label>
                <textarea id="note-body" rows="3" placeholder="入力を開始すると自動で『その場所』の最新位置情報をゼロから取得します。" 
                          class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm resize-none"
                          oninput="triggerAutoGPS()"></textarea>
            </div>

            <!-- 位置情報表示 -->
            <div class="bg-slate-50 rounded-xl p-3 border border-slate-100 space-y-3">
                <div class="flex flex-wrap justify-between items-center gap-2">
                    <span class="text-xs font-semibold text-slate-600 flex items-center gap-1.5">
                        <i data-lucide="map-pin" class="text-rose-500 w-4 h-4"></i>
                        取得された位置情報
                    </span>
                    <button type="button" onclick="forceRefreshGPS()" 
                            class="bg-white hover:bg-slate-100 border border-slate-300 text-slate-700 text-xs px-3 py-1.5 rounded-lg font-medium flex items-center gap-1 shadow-sm transition-all active:scale-95">
                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5" id="refresh-icon"></i>
                        現在地を強制再取得
                    </button>
                </div>

                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 text-xs">
                    <div class="bg-white p-2 rounded-lg border border-slate-100">
                        <div class="text-slate-400">緯度</div>
                        <div class="font-mono font-semibold text-slate-700 mt-0.5" id="val-lat">未取得</div>
                    </div>
                    <div class="bg-white p-2 rounded-lg border border-slate-100">
                        <div class="text-slate-400">経度</div>
                        <div class="font-mono font-semibold text-slate-700 mt-0.5" id="val-lon">未取得</div>
                    </div>
                    <div class="bg-white p-2 rounded-lg border border-slate-100">
                        <div class="text-slate-400">高度</div>
                        <div class="font-mono font-semibold text-slate-700 mt-0.5" id="val-alt">-</div>
                    </div>
                    <div class="bg-white p-2 rounded-lg border border-slate-100">
                        <div class="text-slate-400">位置精度</div>
                        <div class="font-mono font-semibold text-slate-700 mt-0.5" id="val-acc">-</div>
                    </div>
                </div>
                <div id="gps-trouble-hint" class="hidden bg-rose-50 border border-rose-100 text-rose-800 p-2.5 rounded-lg text-[11px]">
                    <span id="gps-hint-text"></span>
                </div>
                <div class="text-[10px] text-slate-400 flex justify-between px-1">
                    <span id="gps-time">取得時間: --:--:--</span>
                    <span id="gps-method">状況: 待機中</span>
                </div>
            </div>

            <!-- 保存・クリアボタン -->
            <div class="flex space-x-3 pt-2">
                <button onclick="clearForm()" 
                        class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm font-semibold py-3 px-4 rounded-xl flex items-center justify-center gap-2">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                    入力クリア
                </button>
                <button onclick="saveRecord()" 
                        class="flex-[2] bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold py-3 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    レコードを記録する
                </button>
            </div>
        </section>

        <!-- メッセージ通知用トースト -->
        <div id="toast" class="fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-4 py-2.5 rounded-full text-xs shadow-xl flex items-center gap-2 opacity-0 pointer-events-none transition-all duration-300 z-[9999]">
            <span id="toast-message"></span>
        </div>

        <!-- 記録一覧とエクスポート -->
        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4">
            <div class="flex flex-wrap justify-between items-center gap-3 border-b border-slate-100 pb-3">
                <h2 class="font-bold text-slate-700 flex items-center gap-2">
                    <i data-lucide="database" class="text-emerald-600 w-5 h-5"></i>
                    調査記録データ (<span id="record-count">0</span>件)
                </h2>
                <div class="flex flex-wrap gap-2">
                    <button onclick="exportToCSV()" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 text-xs px-2.5 py-1.5 rounded-lg font-semibold flex items-center gap-1">
                        <i data-lucide="file-spreadsheet" class="w-3.5 h-3.5"></i>CSV保存
                    </button>
                    <button onclick="exportToJSON()" class="bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 text-xs px-2.5 py-1.5 rounded-lg font-semibold flex items-center gap-1">
                        <i data-lucide="download" class="w-3.5 h-3.5"></i>JSON保存
                    </button>
                    <label class="bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 text-xs px-2.5 py-1.5 rounded-lg font-semibold flex items-center gap-1 cursor-pointer">
                        <i data-lucide="upload" class="w-3.5 h-3.5"></i>読み込み
                        <input type="file" id="import-file" accept=".json" class="hidden" onchange="importJSON(event)">
                    </label>
                    <button onclick="confirmClearAll()" class="bg-rose-50 hover:bg-rose-100 text-rose-700 border border-rose-200 text-xs px-2.5 py-1.5 rounded-lg font-semibold flex items-center gap-1">
                        <i data-lucide="trash" class="w-3.5 h-3.5"></i>全消去
                    </button>
                </div>
            </div>

            <!-- 地図 -->
            <div class="space-y-1">
                <span class="text-xs font-semibold text-slate-500 block">調査プロットマップ</span>
                <div id="map" class="border border-slate-200"></div>
            </div>

            <!-- レコードリスト -->
            <div class="space-y-2 max-h-96 overflow-y-auto custom-scrollbar pr-1">
                <div id="no-records" class="text-center py-8 text-slate-400 text-sm space-y-2">
                    <i data-lucide="sticky-note" class="w-10 h-10 mx-auto opacity-40"></i>
                    <p>保存された調査メモはまだありません。</p>
                </div>
                <div id="records-list" class="space-y-2.5"></div>
            </div>
        </section>
    </main>

    <!-- フッター -->
    <footer class="fixed bottom-0 left-0 right-0 bg-slate-900 text-slate-400 text-xs py-2 px-4 flex justify-between items-center z-40">
        <div class="flex items-center gap-1.5">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span>野外調査レコーダー (シンプル版)</span>
        </div>
    </footer>

    <!-- 全消去確認モーダル -->
    <div id="clear-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[9999] hidden">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 space-y-4 shadow-2xl">
            <h3 class="text-lg font-bold text-rose-600">本当にすべての記録を消去しますか？</h3>
            <div class="flex space-x-3">
                <button onclick="toggleClearModal(false)" class="flex-1 bg-slate-100 text-slate-700 text-xs font-semibold py-2.5 rounded-lg">キャンセル</button>
                <button onclick="clearAllRecords()" class="flex-1 bg-rose-600 text-white text-xs font-bold py-2.5 rounded-lg">削除</button>
            </div>
        </div>
    </div>

    <script>
        let records = [];
        let map = null;
        let mapMarkers = [];
        
        let currentGPS = { latitude: null, longitude: null, altitude: null, accuracy: null, timestamp: null, method: '未取得' };
        let isLocating = false;
        let autoGpsTriggered = false;

        window.onload = function() {
            lucide.createIcons();
            startClock();
            loadFromStorage();
            initMap();
            checkSecurityContext();
        };

        function checkSecurityContext() {
            const isSecure = window.isSecureContext || window.location.protocol === 'https:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            if (!isSecure) document.getElementById('security-warning').classList.remove('hidden');
        }

        function startClock() {
            setInterval(() => {
                document.getElementById('live-clock').textContent = new Date().toTimeString().split(' ')[0];
            }, 1000);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = message;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            setTimeout(() => { toast.classList.remove('opacity-100'); toast.classList.add('opacity-0', 'pointer-events-none'); }, 3000);
        }

        // 入力を検知した時の自動GPSトリガー
        function triggerAutoGPS() {
            if (!autoGpsTriggered && document.getElementById('note-body').value.length >= 1) {
                autoGpsTriggered = true;
                document.getElementById('auto-gps-msg').classList.remove('hidden');
                fetchFreshGPS('自動取得');
            }
        }

        // 手動取得ボタン用
        function forceRefreshGPS() {
            fetchFreshGPS('手動取得(強制再計測)', true);
        }

        // コアGPS取得機能
        function fetchFreshGPS(triggerType = '通常取得', showToastFlag = false) {
            return new Promise((resolve) => {
                if (isLocating) { resolve(false); return; }
                
                isLocating = true;
                updateGPSUIStatus('searching');
                hideGPSTroubleHint();

                const geoOptions = {
                    enableHighAccuracy: true,
                    timeout: 8000,
                    maximumAge: 0 
                };

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        currentGPS.latitude = position.coords.latitude;
                        currentGPS.longitude = position.coords.longitude;
                        currentGPS.altitude = position.coords.altitude !== null ? position.coords.altitude.toFixed(1) + ' m' : '利用不可';
                        currentGPS.accuracy = position.coords.accuracy ? position.coords.accuracy.toFixed(1) + ' m' : '判定不可';
                        currentGPS.timestamp = new Date().toLocaleTimeString();
                        currentGPS.method = triggerType;

                        document.getElementById('val-lat').textContent = currentGPS.latitude.toFixed(6);
                        document.getElementById('val-lon').textContent = currentGPS.longitude.toFixed(6);
                        document.getElementById('val-alt').textContent = currentGPS.altitude;
                        document.getElementById('val-acc').textContent = currentGPS.accuracy;
                        document.getElementById('gps-time').textContent = `取得時間: ${currentGPS.timestamp}`;
                        document.getElementById('gps-method').textContent = `状況: ${currentGPS.method}`;

                        updateGPSUIStatus('success');
                        isLocating = false;
                        if (showToastFlag) showToast("最新の現在地を捕捉しました");
                        resolve(true);
                    },
                    (error) => {
                        const fallbackOptions = { enableHighAccuracy: false, timeout: 6000, maximumAge: 0 };
                        navigator.geolocation.getCurrentPosition(
                            (fbPos) => {
                                currentGPS.latitude = fbPos.coords.latitude;
                                currentGPS.longitude = fbPos.coords.longitude;
                                currentGPS.altitude = fbPos.coords.altitude !== null ? fbPos.coords.altitude.toFixed(1) + ' m' : '利用不可';
                                currentGPS.accuracy = fbPos.coords.accuracy ? fbPos.coords.accuracy.toFixed(1) + ' m' : '判定不可';
                                currentGPS.timestamp = new Date().toLocaleTimeString();
                                currentGPS.method = triggerType + "(低精度モード)";

                                document.getElementById('val-lat').textContent = currentGPS.latitude.toFixed(6);
                                document.getElementById('val-lon').textContent = currentGPS.longitude.toFixed(6);
                                updateGPSUIStatus('success');
                                isLocating = false;
                                resolve(true);
                            },
                            (fbErr) => {
                                updateGPSUIStatus('error');
                                isLocating = false;
                                handleGPSError(fbErr);
                                resolve(false);
                            },
                            fallbackOptions
                        );
                    },
                    geoOptions
                );
            });
        }

        function handleGPSError(error) {
            let msg = "測位エラー: ";
            if (error.code === error.PERMISSION_DENIED) msg += "位置情報の利用許可がありません。";
            else if (error.code === error.POSITION_UNAVAILABLE) msg += "GPS電波を受信できません。障害物のない屋外へ移動してください。";
            else if (error.code === error.TIMEOUT) msg += "応答タイムアウト。再取得ボタンを押してください。";
            showGPSTroubleHint(msg);
        }

        function updateGPSUIStatus(state) {
            const indicator = document.getElementById('gps-indicator');
            const statusText = document.getElementById('gps-status-text');
            const refreshIcon = document.getElementById('refresh-icon');

            if (state === 'searching') {
                indicator.className = "w-2.5 h-2.5 rounded-full bg-amber-500 animate-ping inline-block";
                statusText.textContent = "新位置を測定中...";
                if (refreshIcon) refreshIcon.classList.add('animate-spin');
            } else if (state === 'success') {
                indicator.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 inline-block";
                statusText.textContent = "現在地更新完了";
                if (refreshIcon) refreshIcon.classList.remove('animate-spin');
            } else if (state === 'error') {
                indicator.className = "w-2.5 h-2.5 rounded-full bg-rose-500 inline-block";
                statusText.textContent = "測位エラー";
                if (refreshIcon) refreshIcon.classList.remove('animate-spin');
            }
        }

        function showGPSTroubleHint(m) { const b = document.getElementById('gps-trouble-hint'); document.getElementById('gps-hint-text').textContent = m; b.classList.remove('hidden'); }
        function hideGPSTroubleHint() { document.getElementById('gps-trouble-hint').classList.add('hidden'); }

        // レコード保存処理
        async function saveRecord() {
            const title = document.getElementById('note-title').value.trim();
            const body = document.getElementById('note-body').value.trim();

            if (!body) { showToast("調査メモを入力してください。"); return; }

            showToast("保存前に最新の位置情報を最終チェック中...");
            await fetchFreshGPS('保存時最終同期');

            const now = new Date();
            const formattedDate = `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2, '0')}/${now.getDate().toString().padStart(2, '0')}`;
            const formattedTime = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

            const record = {
                id: 'rec_' + Date.now(),
                date: formattedDate,
                time: formattedTime,
                title: title || `地点_${formattedTime}`,
                body: body,
                lat: currentGPS.latitude,
                lon: currentGPS.longitude,
                alt: currentGPS.altitude,
                acc: currentGPS.accuracy,
                gpsMethod: currentGPS.method
            };

            records.unshift(record);
            saveToStorage();
            renderRecords();
            updateMapMarkers();
            clearForm();
            showToast("時刻と最新の位置情報をセットで記録しました！");
        }

        function clearForm() {
            document.getElementById('note-title').value = '';
            document.getElementById('note-body').value = '';
            document.getElementById('auto-gps-msg').classList.add('hidden');
            autoGpsTriggered = false;

            currentGPS = { latitude: null, longitude: null, altitude: null, accuracy: null, timestamp: null, method: '未取得' };
            document.getElementById('val-lat').textContent = '未取得';
            document.getElementById('val-lon').textContent = '未取得';
            document.getElementById('val-alt').textContent = '-';
            document.getElementById('val-acc').textContent = '-';
            document.getElementById('gps-time').textContent = '取得時間: --:--:--';
            document.getElementById('gps-method').textContent = '状況: 待機中';
            updateGPSUIStatus('searching');
        }

        function deleteRecord(id) {
            records = records.filter(r => r.id !== id);
            saveToStorage(); renderRecords(); updateMapMarkers();
            showToast("レコードを削除しました");
        }

        function saveToStorage() { localStorage.setItem('field_notes_data', JSON.stringify(records)); }
        function loadFromStorage() {
            const raw = localStorage.getItem('field_notes_data');
            if (raw) { try { records = JSON.parse(raw); } catch(e) { records = []; } }
            renderRecords();
        }

        function confirmClearAll() { if (records.length === 0) return; toggleClearModal(true); }
        function toggleClearModal(s) { const m = document.getElementById('clear-modal'); if (s) m.classList.remove('hidden'); else m.classList.add('hidden'); }
        function clearAllRecords() { records = []; saveToStorage(); renderRecords(); updateMapMarkers(); toggleClearModal(false); showToast("全消去しました"); }

        function renderRecords() {
            const container = document.getElementById('records-list');
            const noRecords = document.getElementById('no-records');
            document.getElementById('record-count').textContent = records.length;

            if (records.length === 0) { container.innerHTML = ''; noRecords.classList.remove('hidden'); return; }
            noRecords.classList.add('hidden');

            let html = '';
            records.forEach(r => {
                const hasValidCoords = r.lat !== null && r.lon !== null;
                const coordString = hasValidCoords ? `${r.lat.toFixed(6)}, ${r.lon.toFixed(6)}` : '位置情報なし';

                html += `
                    <div class="bg-slate-50 rounded-xl p-4 border border-slate-200 space-y-2 relative group">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-2">
                                <span class="text-[10px] bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full font-mono">${r.date} ${r.time}</span>
                            </div>
                            <button onclick="deleteRecord('${r.id}')" class="text-slate-400 hover:text-rose-600 p-1"><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                        <h3 class="font-bold text-slate-800 text-sm">${escapeHTML(r.title)}</h3>
                        <p class="text-xs text-slate-600 bg-white p-2.5 rounded-lg border border-slate-100 whitespace-pre-wrap">${escapeHTML(r.body)}</p>
                        <div class="flex justify-between text-[10px] text-slate-400 pt-1 border-t border-dashed border-slate-200">
                            <span class="font-mono text-slate-600">📍 ${coordString}</span>
                            <span>精度: ${r.acc} (${r.gpsMethod})</span>
                        </div>
                        ${hasValidCoords ? `<button onclick="focusOnMap(${r.lat}, ${r.lon})" class="absolute bottom-3 right-3 text-[10px] text-emerald-600 hover:underline">🗺️ 地図</button>` : ''}
                    </div>
                `;
            });
            container.innerHTML = html;
            lucide.createIcons();
        }

        function escapeHTML(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }

        function initMap() {
            map = L.map('map').setView([35.6812, 139.7671], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            updateMapMarkers();
        }

        function updateMapMarkers() {
            if (!map) return;
            mapMarkers.forEach(m => map.removeLayer(m)); mapMarkers = [];
            const validCoords = records.filter(r => r.lat !== null && r.lon !== null);
            if (validCoords.length === 0) return;
            const latlngs = [];
            validCoords.forEach(r => {
                const marker = L.marker([r.lat, r.lon]).addTo(map);
                marker.bindPopup(`<b class="text-xs">${escapeHTML(r.title)}</b>`);
                mapMarkers.push(marker); latlngs.push([r.lat, r.lon]);
            });
            if (latlngs.length > 0) map.fitBounds(L.latLngBounds(latlngs), { padding: [30, 30], maxZoom: 16 });
        }

        function focusOnMap(lat, lon) {
            if (!map) return; map.setView([lat, lon], 16);
            document.getElementById('map').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function exportToCSV() {
            if (records.length === 0) return;
            const headers = ["ID", "日付", "時間", "地点名", "メモ", "緯度", "経度", "高度", "精度"];
            const rows = records.map(r => [r.id, r.date, r.time, r.title, r.body.replace(/\n/g, " "), r.lat||"", r.lon||"", r.alt||"", r.acc||""]);
            const csvContent = "\uFEFF" + [headers.join(","), ...rows.map(e => e.map(val => `"${String(val).replace(/"/g, '""')}"`).join(","))].join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
            link.download = `field_notes_${new Date().toISOString().slice(0,10).replace(/-/g,"")}.csv`;
            link.click();
        }

        function exportToJSON() {
            if (records.length === 0) return;
            const link = document.createElement("a");
            link.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(records, null, 2));
            link.download = `field_notes_${new Date().toISOString().slice(0,10).replace(/-/g,"")}.json`;
            link.click();
        }

        function importJSON(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        records = [...imported, ...records];
                        saveToStorage(); renderRecords(); updateMapMarkers();
                        showToast("インポートが完了しました");
                    }
                } catch (err) { showToast("ファイルの読み込みに失敗しました"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
