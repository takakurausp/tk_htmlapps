<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>野外調査レコーダー</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet CSS & JS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        #map { height: 280px; border-radius: 0.75rem; z-index: 10; cursor: crosshair; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

    <!-- ヘッダー -->
    <header class="bg-emerald-700 text-white shadow-md sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i data-lucide="compass" class="w-6 h-6 animate-spin-slow"></i>
            <h1 class="text-lg font-bold tracking-wider">野外調査レコーダー</h1>
        </div>
        <div class="flex items-center space-x-2">
            <span id="gps-status-badge" class="text-xs bg-emerald-800 text-emerald-200 px-2 py-1 rounded-full flex items-center gap-1">
                <span class="w-2 h-2 rounded-full bg-slate-400 inline-block" id="gps-indicator"></span>
                <span id="gps-status-text">GPS待機中</span>
            </span>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-1 max-w-4xl w-full mx-auto p-4 space-y-4 pb-24">

        <!-- 環境診断バナー（GPSが動かない理由を可視化） -->
        <section id="system-diagnostic" class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-2">
            <h3 class="text-xs font-bold text-slate-700 flex items-center gap-1.5">
                <i data-lucide="shield-alert" class="text-amber-500 w-4 h-4"></i>
                システム・GPS通信動作環境の診断結果
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2 text-xs">
                <div class="flex items-center justify-between bg-slate-50 p-2 rounded-lg border border-slate-100" id="diag-secure">
                    <span class="text-slate-500">HTTPS通信環境:</span>
                    <span class="font-bold text-rose-500">検証中</span>
                </div>
                <div class="flex items-center justify-between bg-slate-50 p-2 rounded-lg border border-slate-100" id="diag-iframe">
                    <span class="text-slate-500">ページ表示環境:</span>
                    <span class="font-bold text-rose-500">検証中</span>
                </div>
                <div class="flex items-center justify-between bg-slate-50 p-2 rounded-lg border border-slate-100" id="diag-api">
                    <span class="text-slate-500">位置情報API:</span>
                    <span class="font-bold text-rose-500">検証中</span>
                </div>
            </div>
            <!-- エラー解決用のアドバイスを動的表示 -->
            <div id="diag-advice" class="hidden text-[11px] bg-amber-50 border border-amber-200 text-amber-900 p-2.5 rounded-lg space-y-1">
                <p class="font-semibold">⚠️ GPSが正常に動作しない恐れがあります：</p>
                <ul class="list-disc pl-4 space-y-0.5" id="diag-advice-list">
                    <!-- JavaScriptで問題点を出力 -->
                </ul>
            </div>
        </section>

        <!-- 新規レコード入力カード -->
        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4">
            <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                <h2 class="font-bold text-slate-700 flex items-center gap-2">
                    <i data-lucide="pen-tool" class="text-emerald-600 w-5 h-5"></i>
                    新規調査メモの入力
                </h2>
                <span class="text-xs text-slate-400" id="live-clock">00:00:00</span>
            </div>

            <!-- 入力フォーム -->
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">調査地点名 / タグ</label>
                <input type="text" id="note-title" placeholder="例: 地点A, コドラート1, 湧水サンプリング地点" 
                       class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
            </div>

            <!-- メモ本文 -->
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1 flex justify-between">
                    <span>調査メモ・測定データ</span>
                    <span class="text-emerald-600 text-[10px] font-normal animate-pulse hidden" id="auto-gps-msg">
                        現在地のアクティブGPSスキャンを実行中...
                    </span>
                </label>
                <textarea id="note-body" rows="3" placeholder="文字を入力し始めると、自動的に最新のGPSスキャンを裏で開始します。" 
                          class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm resize-none"
                          oninput="triggerAutoGPS()"></textarea>
            </div>

            <!-- 位置情報表示と編集・微調整機能 -->
            <div class="bg-slate-50 rounded-xl p-3 border border-slate-100 space-y-3">
                <div class="flex flex-wrap justify-between items-center gap-2">
                    <span class="text-xs font-semibold text-slate-600 flex items-center gap-1.5">
                        <i data-lucide="map-pin" class="text-rose-500 w-4 h-4"></i>
                        緯度経度データ（直接入力や地図タップで手動調整可能）
                    </span>
                    <button type="button" onclick="forceRefreshGPS()" 
                            class="bg-white hover:bg-slate-100 border border-slate-300 text-slate-700 text-xs px-3 py-1.5 rounded-lg font-medium flex items-center gap-1 shadow-sm transition-all active:scale-95">
                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5" id="refresh-icon"></i>
                        現在地を再測定(5秒間スキャン)
                    </button>
                </div>

                <!-- 手動で編集可能な入力フィールド -->
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 text-xs">
                    <div class="bg-white p-2 rounded-lg border border-slate-200">
                        <label class="text-[10px] text-slate-400 block font-semibold">緯度 (Latitude)</label>
                        <input type="number" id="input-lat" step="0.000001" placeholder="未取得" oninput="syncManualInputsToCoordinates()"
                               class="w-full bg-transparent font-mono font-semibold text-slate-700 mt-0.5 focus:outline-none focus:text-emerald-600">
                    </div>
                    <div class="bg-white p-2 rounded-lg border border-slate-200">
                        <label class="text-[10px] text-slate-400 block font-semibold">経度 (Longitude)</label>
                        <input type="number" id="input-lon" step="0.000001" placeholder="未取得" oninput="syncManualInputsToCoordinates()"
                               class="w-full bg-transparent font-mono font-semibold text-slate-700 mt-0.5 focus:outline-none focus:text-emerald-600">
                    </div>
                    <div class="bg-white p-2 rounded-lg border border-slate-200">
                        <label class="text-[10px] text-slate-400 block font-semibold">高度 (Altitude)</label>
                        <input type="text" id="input-alt" placeholder="利用不可" oninput="syncManualInputsToCoordinates()"
                               class="w-full bg-transparent font-mono font-semibold text-slate-700 mt-0.5 focus:outline-none focus:text-emerald-600">
                    </div>
                    <div class="bg-white p-2 rounded-lg border border-slate-200">
                        <label class="text-[10px] text-slate-400 block font-semibold">位置精度 (Accuracy)</label>
                        <input type="text" id="input-acc" placeholder="判定不可" oninput="syncManualInputsToCoordinates()"
                               class="w-full bg-transparent font-mono font-semibold text-slate-700 mt-0.5 focus:outline-none focus:text-emerald-600">
                    </div>
                </div>

                <!-- 取得履歴デバッグログ -->
                <div id="gps-trouble-hint" class="hidden bg-rose-50 border border-rose-100 text-rose-800 p-2.5 rounded-lg text-[11px]">
                    <span id="gps-hint-text"></span>
                </div>
                <div class="text-[10px] text-slate-400 flex justify-between px-1">
                    <span id="gps-time">取得時間: --:--:--</span>
                    <span id="gps-method">状況: 待機中</span>
                </div>
            </div>

            <!-- 保存・クリアボタン -->
            <div class="flex space-x-3 pt-2">
                <button onclick="clearForm()" 
                        class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm font-semibold py-3 px-4 rounded-xl flex items-center justify-center gap-2">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                    入力クリア
                </button>
                <button onclick="saveRecord()" 
                        class="flex-[2] bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold py-3 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    レコードを記録する
                </button>
            </div>
        </section>

        <!-- メッセージ通知用トースト -->
        <div id="toast" class="fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-4 py-2.5 rounded-full text-xs shadow-xl flex items-center gap-2 opacity-0 pointer-events-none transition-all duration-300 z-[9999]">
            <span id="toast-message"></span>
        </div>

        <!-- 記録一覧とエクスポート -->
        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4">
            <div class="flex flex-wrap justify-between items-center gap-3 border-b border-slate-100 pb-3">
                <h2 class="font-bold text-slate-700 flex items-center gap-2">
                    <i data-lucide="database" class="text-emerald-600 w-5 h-5"></i>
                    調査記録データ (<span id="record-count">0</span>件)
                </h2>
                <div class="flex flex-wrap gap-2">
                    <button onclick="exportToCSV()" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 text-xs px-2.5 py-1.5 rounded-lg font-semibold flex items-center gap-1">
                        <i data-lucide="file-spreadsheet" class="w-3.5 h-3.5"></i>CSV保存
                    </button>
                    <button onclick="exportToJSON()" class="bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 text-xs px-2.5 py-1.5 rounded-lg font-semibold flex items-center gap-1">
                        <i data-lucide="download" class="w-3.5 h-3.5"></i>JSON保存
                    </button>
                    <label class="bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 text-xs px-2.5 py-1.5 rounded-lg font-semibold flex items-center gap-1 cursor-pointer">
                        <i data-lucide="upload" class="w-3.5 h-3.5"></i>読み込み
                        <input type="file" id="import-file" accept=".json" class="hidden" onchange="importJSON(event)">
                    </label>
                    <button onclick="confirmClearAll()" class="bg-rose-50 hover:bg-rose-100 text-rose-700 border border-rose-200 text-xs px-2.5 py-1.5 rounded-lg font-semibold flex items-center gap-1">
                        <i data-lucide="trash" class="w-3.5 h-3.5"></i>全消去
                    </button>
                </div>
            </div>

            <!-- 地図 -->
            <div class="space-y-1">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-semibold text-slate-500 block">調査プロットマップ</span>
                    <span class="text-[10px] text-amber-600 bg-amber-50 px-2 py-0.5 rounded border border-amber-100">
                        💡 地図をタップするとその地点の緯度経度が上記フォームに入力されます
                    </span>
                </div>
                <div id="map" class="border border-slate-200"></div>
            </div>

            <!-- レコードリスト -->
            <div class="space-y-2 max-h-96 overflow-y-auto custom-scrollbar pr-1">
                <div id="no-records" class="text-center py-8 text-slate-400 text-sm space-y-2">
                    <i data-lucide="sticky-note" class="w-10 h-10 mx-auto opacity-40"></i>
                    <p>保存された調査メモはまだありません。</p>
                </div>
                <div id="records-list" class="space-y-2.5"></div>
            </div>
        </section>
    </main>

    <!-- フッター -->
    <footer class="fixed bottom-0 left-0 right-0 bg-slate-900 text-slate-400 text-xs py-2 px-4 flex justify-between items-center z-40">
        <div class="flex items-center gap-1.5">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span>診断＆手動補正・数値編集対応版 (v1.6)</span>
        </div>
    </footer>

    <!-- 全消去確認モーダル -->
    <div id="clear-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[9999] hidden">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 space-y-4 shadow-2xl">
            <h3 class="text-lg font-bold text-rose-600">本当にすべての記録を消去しますか？</h3>
            <div class="flex space-x-3">
                <button onclick="toggleClearModal(false)" class="flex-1 bg-slate-100 text-slate-700 text-xs font-semibold py-2.5 rounded-lg">キャンセル</button>
                <button onclick="clearAllRecords()" class="flex-1 bg-rose-600 text-white text-xs font-bold py-2.5 rounded-lg">削除</button>
            </div>
        </div>
    </div>

    <script>
        let records = [];
        let map = null;
        let mapMarkers = [];
        let activeSelectionMarker = null; // 手動選択中の仮ピン
        
        let currentGPS = { latitude: null, longitude: null, altitude: null, accuracy: null, timestamp: null, method: '未取得' };
        let isLocating = false;
        let autoGpsTriggered = false;

        window.onload = function() {
            lucide.createIcons();
            startClock();
            loadFromStorage();
            initMap();
            runSystemDiagnostic();
        };

        // --- システム・GPS動作可否の診断エンジン ---
        function runSystemDiagnostic() {
            const diagSecure = document.getElementById('diag-secure');
            const diagIframe = document.getElementById('diag-iframe');
            const diagApi = document.getElementById('diag-api');
            const adviceBox = document.getElementById('diag-advice');
            const adviceList = document.getElementById('diag-advice-list');

            let issues = [];

            // 1. セキュアコンテキスト判定 (HTTPS)
            const isSecure = window.isSecureContext || window.location.protocol === 'https:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            if (isSecure) {
                diagSecure.innerHTML = `<span class="text-slate-500">HTTPS通信環境:</span><span class="text-emerald-600 font-bold flex items-center gap-0.5"><i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i>安全 (OK)</span>`;
            } else {
                diagSecure.innerHTML = `<span class="text-slate-500">HTTPS通信環境:</span><span class="text-rose-600 font-bold flex items-center gap-0.5"><i data-lucide="x-circle" class="w-3.5 h-3.5"></i>非推奨 (HTTP)</span>`;
                issues.push("現在、暗号化されていない接続(http://)です。モバイルブラウザの仕様により、位置情報機能は強制的に拒否されます。必ず『https://』のアドレスで接続してください。");
            }

            // 2. iframe（インラインフレーム）判定
            const isIframe = window.self !== window.top;
            if (!isIframe) {
                diagIframe.innerHTML = `<span class="text-slate-500">ページ表示環境:</span><span class="text-emerald-600 font-bold flex items-center gap-0.5"><i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i>直接表示 (OK)</span>`;
            } else {
                diagIframe.innerHTML = `<span class="text-slate-500">ページ表示環境:</span><span class="text-amber-600 font-bold flex items-center gap-0.5"><i data-lucide="info" class="w-3.5 h-3.5"></i>フレーム内 (警告)</span>`;
                issues.push("アプリがプレビュー枠（iframe）の中で動作しています。フレームのセキュリティポリシーにより、GPS取得の要求がブラウザによってブロックされている可能性があります。画面の『外部ブラウザで開く』や『全画面で表示』機能をお試しください。");
            }

            // 3. API自体のサポート判定
            if ('geolocation' in navigator) {
                diagApi.innerHTML = `<span class="text-slate-500">位置情報API:</span><span class="text-emerald-600 font-bold flex items-center gap-0.5"><i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i>対応 (OK)</span>`;
                
                // 権限ステータスの問い合わせ
                if (navigator.permissions && navigator.permissions.query) {
                    navigator.permissions.query({ name: 'geolocation' }).then(status => {
                        handlePermissionStatus(status.state, issues, adviceBox, adviceList);
                        status.onchange = () => {
                            location.reload();
                        };
                    }).catch(err => {
                        console.warn("Permission query not supported", err);
                    });
                }
            } else {
                diagApi.innerHTML = `<span class="text-slate-500">位置情報API:</span><span class="text-rose-600 font-bold flex items-center gap-0.5"><i data-lucide="x-circle" class="w-3.5 h-3.5"></i>非対応</span>`;
                issues.push("お使いのブラウザは位置情報サービスAPIに対応していません。別のブラウザ（Chrome, Safari等）を使用してください。");
            }

            // アドバイスボックスの更新表示
            renderDiagnosticAdvice(issues, adviceBox, adviceList);
            lucide.createIcons();
        }

        function handlePermissionStatus(state, issues, adviceBox, adviceList) {
            if (state === 'denied') {
                issues.push("ブラウザまたはOSから、このサイトへの位置情報の利用権限が『拒否』されています。ブラウザのアドレスバーの左側（鍵マークや設定マーク）をタップして、位置情報のアクセスを許可してください。");
                renderDiagnosticAdvice(issues, adviceBox, adviceList);
                lucide.createIcons();
            }
        }

        function renderDiagnosticAdvice(issues, adviceBox, adviceList) {
            if (issues.length > 0) {
                adviceList.innerHTML = issues.map(item => `<li>${item}</li>`).join("");
                adviceBox.classList.remove('hidden');
            } else {
                adviceBox.classList.add('hidden');
            }
        }

        // --- 時計表示 ---
        function startClock() {
            setInterval(() => {
                document.getElementById('live-clock').textContent = new Date().toTimeString().split(' ')[0];
            }, 1000);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = message;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            setTimeout(() => { toast.classList.remove('opacity-100'); toast.classList.add('opacity-0', 'pointer-events-none'); }, 3000);
        }

        // 入力を検知した時の自動GPSトリガー
        function triggerAutoGPS() {
            if (!autoGpsTriggered && document.getElementById('note-body').value.length >= 1) {
                autoGpsTriggered = true;
                document.getElementById('auto-gps-msg').classList.remove('hidden');
                fetchFreshGPS('自動スキャン');
            }
        }

        // 手動取得ボタン用
        function forceRefreshGPS() {
            fetchFreshGPS('手動スキャン(強制再測定)', true);
        }

        // --- 地図上の手動タップ位置指定機能 ---
        function setManualLocation(lat, lon) {
            currentGPS.latitude = lat;
            currentGPS.longitude = lon;
            currentGPS.altitude = '地図指定のためなし';
            currentGPS.accuracy = '0.1 m (手動補正)';
            currentGPS.timestamp = new Date().toLocaleTimeString();
            currentGPS.method = '地図タップ指定';

            // 入力フィールドの数値を更新
            document.getElementById('input-lat').value = lat.toFixed(6);
            document.getElementById('input-lon').value = lon.toFixed(6);
            document.getElementById('input-alt').value = 'なし';
            document.getElementById('input-acc').value = '0.1m (高精度)';
            
            document.getElementById('gps-time').textContent = `指定時間: ${currentGPS.timestamp}`;
            document.getElementById('gps-method').textContent = `状況: 地図指定`;

            // 地図上に仮の選択ピンを表示
            drawActiveSelectionMarker(lat, lon);

            updateGPSUIStatus('success');
            hideGPSTroubleHint();
        }

        // --- 手動入力フィールドが直接編集された際のリアルタイム同期 ---
        function syncManualInputsToCoordinates() {
            const latVal = parseFloat(document.getElementById('input-lat').value);
            const lonVal = parseFloat(document.getElementById('input-lon').value);
            const altVal = document.getElementById('input-alt').value || 'なし';
            const accVal = document.getElementById('input-acc').value || '手動入力';

            if (!isNaN(latVal) && !isNaN(lonVal)) {
                currentGPS.latitude = latVal;
                currentGPS.longitude = lonVal;
                currentGPS.altitude = altVal;
                currentGPS.accuracy = accVal;
                currentGPS.timestamp = new Date().toLocaleTimeString();
                currentGPS.method = 'キーボード手動入力';

                document.getElementById('gps-time').textContent = `変更時間: ${currentGPS.timestamp}`;
                document.getElementById('gps-method').textContent = `状況: 手動編集`;

                drawActiveSelectionMarker(latVal, lonVal);
                updateGPSUIStatus('success');
            }
        }

        function drawActiveSelectionMarker(lat, lon) {
            if (activeSelectionMarker) {
                map.removeLayer(activeSelectionMarker);
            }
            activeSelectionMarker = L.marker([lat, lon], {
                icon: L.divIcon({
                    html: '📍',
                    className: 'text-2xl',
                    iconSize: [24, 24],
                    iconAnchor: [12, 24]
                })
            }).addTo(map);
        }

        // --- コアロジック: watchPositionを使ったアクティブスキャン方式 ---
        function fetchFreshGPS(triggerType = '通常取得', showToastFlag = false) {
            return new Promise((resolve) => {
                if (isLocating) { resolve(false); return; }
                
                isLocating = true;
                updateGPSUIStatus('searching');
                hideGPSTroubleHint();

                let watchId = null;
                let bestPosition = null;
                let scanTimeout = null;

                const stopScanning = () => {
                    if (watchId !== null) {
                        navigator.geolocation.clearWatch(watchId);
                        watchId = null;
                    }
                    if (scanTimeout) {
                        clearTimeout(scanTimeout);
                        scanTimeout = null;
                    }
                };

                // タイムアウト設定（5秒間追跡して、その中で最良のデータを適用する）
                scanTimeout = setTimeout(() => {
                    stopScanning();
                    if (bestPosition) {
                        applyPositionData(bestPosition, `${triggerType} (スキャン完了)`, showToastFlag);
                        resolve(true);
                    } else {
                        // 5秒間で一度もGPSイベントが降ってこなかった場合は、従来の単発フォールバックを実行
                        fetchSingleFallback(triggerType, showToastFlag, resolve);
                    }
                }, 5000);

                const geoOptions = {
                    enableHighAccuracy: true,
                    timeout: 4500,
                    maximumAge: 0 // キャッシュを100%拒否
                };

                watchId = navigator.geolocation.watchPosition(
                    (position) => {
                        if (!bestPosition || position.coords.accuracy < bestPosition.coords.accuracy) {
                            bestPosition = position;
                        }
                        
                        // もしすでに15メートル以内の極めて高精度な値が取得できれば、5秒を待たずに即時適用・終了
                        if (position.coords.accuracy && position.coords.accuracy <= 15) {
                            stopScanning();
                            applyPositionData(position, `${triggerType} (即時キャリブレーション)`, showToastFlag);
                            resolve(true);
                        }
                    },
                    (error) => {
                        console.warn("アクティブスキャン追跡中のエラー (継続します):", error);
                    },
                    geoOptions
                );
            });
        }

        // GPS単発取得へのフォールバック
        function fetchSingleFallback(triggerType, showToastFlag, resolve) {
            const fallbackOptions = { enableHighAccuracy: false, timeout: 5000, maximumAge: 0 };
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    applyPositionData(position, `${triggerType} (単発フォールバック)`, showToastFlag);
                    resolve(true);
                },
                (error) => {
                    updateGPSUIStatus('error');
                    isLocating = false;
                    handleGPSError(error);
                    resolve(false);
                },
                fallbackOptions
            );
        }

        // 取得した生のGPSデータを各種変数とUIに流し込む
        function applyPositionData(position, methodLabel, showToastFlag) {
            currentGPS.latitude = position.coords.latitude;
            currentGPS.longitude = position.coords.longitude;
            currentGPS.altitude = position.coords.altitude !== null ? position.coords.altitude.toFixed(1) + ' m' : '利用不可';
            currentGPS.accuracy = position.coords.accuracy ? position.coords.accuracy.toFixed(1) + ' m' : '判定不可';
            currentGPS.timestamp = new Date().toLocaleTimeString();
            currentGPS.method = methodLabel;

            // UIの入力欄を更新
            document.getElementById('input-lat').value = currentGPS.latitude.toFixed(6);
            document.getElementById('input-lon').value = currentGPS.longitude.toFixed(6);
            document.getElementById('input-alt').value = currentGPS.altitude;
            document.getElementById('input-acc').value = currentGPS.accuracy;
            
            document.getElementById('gps-time').textContent = `取得時間: ${currentGPS.timestamp}`;
            document.getElementById('gps-method').textContent = `状況: ${currentGPS.method}`;

            if (activeSelectionMarker) {
                map.removeLayer(activeSelectionMarker);
                activeSelectionMarker = null;
            }

            // 地図の中心を取得位置に変更
            if (map) {
                map.setView([currentGPS.latitude, currentGPS.longitude], 15);
            }

            updateGPSUIStatus('success');
            hideGPSTroubleHint();
            isLocating = false;

            if (showToastFlag) showToast("最新の現在地を捕捉しました");
        }

        function handleGPSError(error) {
            let msg = "測位エラー: ";
            if (error.code === error.PERMISSION_DENIED) msg += "位置情報の利用許可がありません。ブラウザ設定のGPSブロックを解除するか、上記入力欄に手動入力、もしくは地図をタップして記録してください。";
            else if (error.code === error.POSITION_UNAVAILABLE) msg += "GPS電波を受信できません。建物から出て再度お試しいただくか、手動入力・地図直接タップをご利用ください。";
            else if (error.code === error.TIMEOUT) msg += "応答タイムアウト。地図上タップでの位置指定、または緯度経度値の直接入力をお試しください。";
            showGPSTroubleHint(msg);
        }

        function updateGPSUIStatus(state) {
            const indicator = document.getElementById('gps-indicator');
            const statusText = document.getElementById('gps-status-text');
            const refreshIcon = document.getElementById('refresh-icon');

            if (state === 'searching') {
                indicator.className = "w-2.5 h-2.5 rounded-full bg-amber-500 animate-ping inline-block";
                statusText.textContent = "新位置をリアルタイム測定中...";
                if (refreshIcon) refreshIcon.classList.add('animate-spin');
            } else if (state === 'success') {
                indicator.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 inline-block";
                statusText.textContent = "現在地捕捉完了";
                if (refreshIcon) refreshIcon.classList.remove('animate-spin');
            } else if (state === 'error') {
                indicator.className = "w-2.5 h-2.5 rounded-full bg-rose-500 inline-block";
                statusText.textContent = "測位エラー";
                if (refreshIcon) refreshIcon.classList.remove('animate-spin');
            }
        }

        function showGPSTroubleHint(m) { const b = document.getElementById('gps-trouble-hint'); document.getElementById('gps-hint-text').textContent = m; b.classList.remove('hidden'); }
        function hideGPSTroubleHint() { document.getElementById('gps-trouble-hint').classList.add('hidden'); }

        // レコード保存処理
        async function saveRecord() {
            const title = document.getElementById('note-title').value.trim();
            const body = document.getElementById('note-body').value.trim();

            if (!body) { showToast("調査メモを入力してください。"); return; }

            // 手動入力フィールドの値を取得して最終同期
            const manualLat = parseFloat(document.getElementById('input-lat').value);
            const manualLon = parseFloat(document.getElementById('input-lon').value);

            if (isNaN(manualLat) || isNaN(manualLon)) {
                // GPSが未取得かつ手動入力もない場合はスキャンを試みる
                showToast("保存前に位置情報をスキャン中...");
                await fetchFreshGPS('保存時最終同期');
            } else {
                // 手動入力されている値を最優先で記録
                currentGPS.latitude = manualLat;
                currentGPS.longitude = manualLon;
                currentGPS.altitude = document.getElementById('input-alt').value || '利用不可';
                currentGPS.accuracy = document.getElementById('input-acc').value || '手動入力';
            }

            // それでも位置情報がない場合の最終チェック
            if (currentGPS.latitude === null || currentGPS.longitude === null) {
                showToast("⚠️ 位置情報がありません。地図をタップするか、緯度経度を直接入力してください。");
                return;
            }

            const now = new Date();
            const formattedDate = `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2, '0')}/${now.getDate().toString().padStart(2, '0')}`;
            const formattedTime = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

            const record = {
                id: 'rec_' + Date.now(),
                date: formattedDate,
                time: formattedTime,
                title: title || `地点_${formattedTime}`,
                body: body,
                lat: currentGPS.latitude,
                lon: currentGPS.longitude,
                alt: currentGPS.altitude,
                acc: currentGPS.accuracy,
                gpsMethod: currentGPS.method
            };

            records.unshift(record);
            saveToStorage();
            renderRecords();
            updateMapMarkers();
            clearForm();
            showToast("時刻と位置情報をセットで記録しました！");
        }

        function clearForm() {
            document.getElementById('note-title').value = '';
            document.getElementById('note-body').value = '';
            document.getElementById('auto-gps-msg').classList.add('hidden');
            autoGpsTriggered = false;

            if (activeSelectionMarker) {
                map.removeLayer(activeSelectionMarker);
                activeSelectionMarker = null;
            }

            // 入力欄をクリア
            document.getElementById('input-lat').value = '';
            document.getElementById('input-lon').value = '';
            document.getElementById('input-alt').value = '';
            document.getElementById('input-acc').value = '';

            // 状態リセット
            currentGPS = { latitude: null, longitude: null, altitude: null, accuracy: null, timestamp: null, method: '未取得' };
            document.getElementById('gps-time').textContent = '取得時間: --:--:--';
            document.getElementById('gps-method').textContent = '状況: 待機中';
            updateGPSUIStatus('searching');
        }

        function deleteRecord(id) {
            records = records.filter(r => r.id !== id);
            saveToStorage(); renderRecords(); updateMapMarkers();
            showToast("レコードを削除しました");
        }

        function saveToStorage() { localStorage.setItem('field_notes_data', JSON.stringify(records)); }
        function loadFromStorage() {
            const raw = localStorage.getItem('field_notes_data');
            if (raw) { try { records = JSON.parse(raw); } catch(e) { records = []; } }
            renderRecords();
        }

        function confirmClearAll() { if (records.length === 0) return; toggleClearModal(true); }
        function toggleClearModal(s) { const m = document.getElementById('clear-modal'); if (s) m.classList.remove('hidden'); else m.classList.add('hidden'); }
        function clearAllRecords() { records = []; saveToStorage(); renderRecords(); updateMapMarkers(); toggleClearModal(false); showToast("全消去しました"); }

        function renderRecords() {
            const container = document.getElementById('records-list');
            const noRecords = document.getElementById('no-records');
            document.getElementById('record-count').textContent = records.length;

            if (records.length === 0) { container.innerHTML = ''; noRecords.classList.remove('hidden'); return; }
            noRecords.classList.add('hidden');

            let html = '';
            records.forEach(r => {
                const hasValidCoords = r.lat !== null && r.lon !== null;
                const coordString = hasValidCoords ? `${r.lat.toFixed(6)}, ${r.lon.toFixed(6)}` : '位置情報なし';

                html += `
                    <div class="bg-slate-50 rounded-xl p-4 border border-slate-200 space-y-2 relative group">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-2">
                                <span class="text-[10px] bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full font-mono">${r.date} ${r.time}</span>
                            </div>
                            <button onclick="deleteRecord('${r.id}')" class="text-slate-400 hover:text-rose-600 p-1"><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                        <h3 class="font-bold text-slate-800 text-sm">${escapeHTML(r.title)}</h3>
                        <p class="text-xs text-slate-600 bg-white p-2.5 rounded-lg border border-slate-100 whitespace-pre-wrap">${escapeHTML(r.body)}</p>
                        <div class="flex justify-between text-[10px] text-slate-400 pt-1 border-t border-dashed border-slate-200">
                            <span class="font-mono text-slate-600">📍 ${coordString}</span>
                            <span>精度: ${r.acc} (${r.gpsMethod})</span>
                        </div>
                        ${hasValidCoords ? `<button onclick="focusOnMap(${r.lat}, ${r.lon})" class="absolute bottom-3 right-3 text-[10px] text-emerald-600 hover:underline">🗺️ 地図</button>` : ''}
                    </div>
                `;
            });
            container.innerHTML = html;
            lucide.createIcons();
        }

        function escapeHTML(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }

        function initMap() {
            // 日本全体を表示
            map = L.map('map').setView([35.6812, 139.7671], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // 地図上をクリック・タップしたときに、その場所を最新の測定値として強制セットする
            map.on('click', function(e) {
                setManualLocation(e.latlng.lat, e.latlng.lng);
                showToast("地図からピンポイントで位置を設定しました！");
            });

            updateMapMarkers();
        }

        function updateMapMarkers() {
            if (!map) return;
            mapMarkers.forEach(m => map.removeLayer(m)); mapMarkers = [];
            const validCoords = records.filter(r => r.lat !== null && r.lon !== null);
            if (validCoords.length === 0) return;
            const latlngs = [];
            validCoords.forEach(r => {
                const marker = L.marker([r.lat, r.lon]).addTo(map);
                marker.bindPopup(`<b class="text-xs">${escapeHTML(r.title)}</b>`);
                mapMarkers.push(marker); latlngs.push([r.lat, r.lon]);
            });
            if (latlngs.length > 0) map.fitBounds(L.latLngBounds(latlngs), { padding: [30, 30], maxZoom: 16 });
        }

        function focusOnMap(lat, lon) {
            if (!map) return; map.setView([lat, lon], 16);
            document.getElementById('map').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function exportToCSV() {
            if (records.length === 0) return;
            const headers = ["ID", "日付", "時間", "地点名", "メモ", "緯度", "経度", "高度", "精度"];
            const rows = records.map(r => [r.id, r.date, r.time, r.title, r.body.replace(/\n/g, " "), r.lat||"", r.lon||"", r.alt||"", r.acc||""]);
            const csvContent = "\uFEFF" + [headers.join(","), ...rows.map(e => e.map(val => `"${String(val).replace(/"/g, '""')}"`).join(","))].join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
            link.download = `field_notes_${new Date().toISOString().slice(0,10).replace(/-/g,"")}.csv`;
            link.click();
        }

        function exportToJSON() {
            if (records.length === 0) return;
            const link = document.createElement("a");
            link.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(records, null, 2));
            link.download = `field_notes_${new Date().toISOString().slice(0,10).replace(/-/g,"")}.json`;
            link.click();
        }

        function importJSON(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        records = [...imported, ...records];
                        saveToStorage(); renderRecords(); updateMapMarkers();
                        showToast("インポートが完了しました");
                    }
                } catch (err) { showToast("ファイルの読み込みに失敗しました"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
